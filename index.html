<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Атлас живописи — Dracubik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

button {
  font: inherit;
  color: inherit;
  background: none;
  border: none;
  padding: 0;
  margin: 0;
  cursor: pointer;
  text-decoration: none !important;
  -webkit-appearance: none;
  appearance: none;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}
/* Belt-and-suspenders: kill underlines on ALL interactive elements */
a, button, [role="button"] {
  -webkit-tap-highlight-color: transparent;
}
a.card, a.card *, a.card-sub {
  text-decoration: none !important;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #F5F0E8;
  color: #1C1814;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ──────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  padding: 10px 24px;
  gap: 12px;
  background: #FAF8F3;
  border-bottom: 1px solid #E5DED2;
  flex-shrink: 0;
}
.h-brand { display: flex; align-items: baseline; gap: 9px; }
.h-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.01em;
  color: #1C1814;
}
.h-by {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #C47448;
}
.h-stats {
  font-size: 11px;
  color: #A09688;
  margin-left: auto;
  white-space: nowrap;
}
.h-ver { font-size: 10px; color: #C8B090; margin-left: 8px; }

/* ── BARS ────────────────────────────────────── */
.bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 24px;
  border-bottom: 1px solid #E5DED2;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.bar::-webkit-scrollbar { display: none; }
.bar-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #B0A898;
  flex-shrink: 0;
  padding-right: 4px;
}
#lists-bar { background: #F0E8DA; }
#lists-bar .pill { border-color: #D2C2A6; }
#lists-bar .pill:hover { background: #E5D5BC; }
#filters-bar { background: #FAF8F3; }

.pill {
  padding: 4px 13px;
  font-size: 12px;
  font-weight: 400;
  border: 1px solid #D8D0C4;
  border-radius: 20px;
  color: #7A6E62;
  white-space: nowrap;
  flex-shrink: 0;
  line-height: 1.6;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.pill:hover { background: #F0E8DC; border-color: #C8B89C; color: #3C3028; }
.pill.active { background: #C47448; border-color: #C47448; color: #fff; }

/* ── MAP ─────────────────────────────────────── */
#map-wrap {
  flex: 1;
  position: relative;
  background: #A8B4BF;
  overflow: hidden;
  min-height: 0;
  cursor: grab;
}
#map-wrap:active { cursor: grabbing; }
#world-svg { width: 100%; height: 100%; display: block; touch-action: none; }

.country { stroke: #F5F0E8; stroke-width: 0.4; transition: fill 0.13s; cursor: default; }
.clr-0 { fill: #C8C0B0; }
.clr-A { fill: #C47448; }
.has-artists.clr-A:hover { fill: #A85830; }
.has-artists.clr-A.active { fill: #8A3C14; }
.clr-B { fill: #6890BE; }
.has-artists.clr-B:hover { fill: #4A72A0; }
.has-artists.clr-B.active { fill: #2E5888; }
.clr-C { fill: #6A9A6A; }
.has-artists.clr-C:hover { fill: #4E7E4E; }
.has-artists.clr-C.active { fill: #366038; }
.clr-D { fill: #C8A038; }
.has-artists.clr-D:hover { fill: #A8841C; }
.has-artists.clr-D.active { fill: #886800; }
.clr-E { fill: #A87272; }
.has-artists.clr-E:hover { fill: #8A5656; }
.has-artists.clr-E.active { fill: #703838; }
.has-artists { cursor: pointer; }

#tip {
  position: absolute;
  background: rgba(22, 18, 12, 0.86);
  color: #F2EDE4;
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 5px;
  pointer-events: none;
  transform: translate(-50%, calc(-100% - 10px));
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.1s;
  z-index: 20;
}
#hint {
  position: absolute;
  bottom: 14px; left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(242, 237, 228, 0.92);
  background: rgba(22, 18, 12, 0.38);
  padding: 5px 16px;
  border-radius: 20px;
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 0.5s;
  z-index: 10;
}
#hint.gone { opacity: 0; }
#reset-btn {
  position: absolute;
  bottom: 14px; right: 14px;
  width: 32px; height: 32px;
  background: rgba(250, 248, 243, 0.88);
  border: 1px solid #D0C8BC;
  border-radius: 7px;
  font-size: 14px;
  color: #7A6E62;
  z-index: 10;
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, color 0.12s;
}
#reset-btn:hover { background: #FAF8F3; color: #1C1814; }

/* ── PANEL — right-side frosted glass overlay ──────────────────── */
#panel {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  width: min(48vw, 580px);
  z-index: 50;
  /* Solid base — blur added only on desktop via min-width query below */
  background: #FEFCF8;
  border-left: 1px solid rgba(229, 222, 210, 0.65);
  box-shadow: -6px 0 36px rgba(28, 24, 18, 0.13);
  transform: translateX(110%);
  transition: transform 0.26s cubic-bezier(.4,0,.2,1);
  z-index: 30;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
/* Frosted glass only on desktop where GPU compositing is reliable */
@media (min-width: 641px) {
  #panel {
    background: rgba(252, 250, 246, 0.72);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
  }
}
#panel.open { transform: translateX(0); }
.panel-handle { display: none; }
#panel-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 16px 18px 12px;
  border-bottom: 1px solid rgba(229, 222, 210, 0.7);
  flex-shrink: 0;
}
.panel-head-text { display: flex; flex-direction: column; }
#panel-country {
  font-family: 'Playfair Display', serif;
  font-size: 19px;
  font-weight: 400;
  color: #1C1814;
  line-height: 1.3;
}
#panel-n { font-size: 11px; color: #A09688; margin-top: 3px; }
#close-btn {
  font-size: 22px; line-height: 1;
  color: #B0A898;
  padding: 1px 4px;
  margin-left: 8px;
  flex-shrink: 0;
  border-radius: 4px;
  transition: color 0.12s;
}
#close-btn:hover { color: #1C1814; }
#grid {
  display: flex;
  flex-direction: column;
  padding: 0 0 24px;
  flex: 1;
  min-height: 0;
}
/* Image strip: below name+chips, max 2 images */
.card-thumbs {
  display: flex;
  gap: 4px;
  margin: 6px 0 0;
  flex-wrap: nowrap;
}
.card-thumb {
  /* Fixed slot: always 1/3 of card width regardless of image count */
  flex: 0 0 calc(33.333% - 3px);
  width: calc(33.333% - 3px);
  height: 120px;
  border-radius: 5px;
  object-fit: cover;
  object-position: center 20%;
  cursor: zoom-in;
  box-shadow: 0 0 0 1px rgba(28,24,20,0.10);
  display: block;
}
/* ── CARD LAYOUT ──────────────────────────────────────────────────── */
a.card, div.card-static {
  display: block;
  width: 100%;
  padding: 13px 16px 11px;
  border-bottom: 1px solid rgba(229, 222, 210, 0.55);
  transition: background 0.12s;
}
a.card:last-child, div.card-static:last-child { border-bottom: none; }
a.card { text-decoration: none; }
a.card:hover { background: rgba(240, 234, 224, 0.65); }

.card-name {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #1C1814;
  line-height: 1.4;
}
.card-arrow { display: block; font-size: 11px; color: #B06438; margin-top: 5px; }
.card-links { margin-top: 6px; display: flex; flex-direction: column; gap: 1px; }
.card-sub {
  display: block;
  font-size: 11px;
  color: #B06438;
  text-decoration: none;
  padding: 2px 0;
}
.card-sub:hover { color: #8A3C14; text-decoration: underline; }

.chip-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.chip {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: #fff;
  padding: 2px 7px;
  border-radius: 9px;
  line-height: 1.5;
  white-space: nowrap;
}
.chip-country {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #fff;
  border: 1px solid currentColor;
  padding: 1px 8px 1px 6px;
}
.chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ── LIGHTBOX ────────────────────────────────── */
#lightbox {
  position: fixed; inset: 0;
  background: rgba(12, 9, 6, 0.88);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 28px;
  cursor: zoom-out;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 92vw;
  max-height: 88vh;
  border-radius: 6px;
  box-shadow: 0 16px 56px rgba(0,0,0,0.5);
}
#lightbox-close {
  position: absolute;
  top: 18px; right: 22px;
  font-size: 30px;
  color: #F5F0E8;
  line-height: 1;
}

/* ── BACKDROP (mobile) ───────────────────────── */
#backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(28, 24, 18, 0.10);
  z-index: 40;
}

/* ── MOBILE ──────────────────────────────────── */
@media (max-width: 640px) {
  header { padding: 9px 16px; gap: 8px; }
  .h-title { font-size: 15px; }
  .h-by { display: none; }
  .h-stats { display: none; }
  .bar { padding: 7px 14px; }

  /* Panel is itself the scroll container — most reliable on iOS/Android */
  #panel {
    position: fixed;
    right: 0; left: 0; bottom: 0;
    top: auto !important;
    width: 100% !important;
    z-index: 50;
    transform: none !important;
    height: 0;
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    transition: height 0.28s ease-out !important;
    border-radius: 14px 14px 0 0;
    border-left: none;
    border-top: 1px solid #E5DED2;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.16);
    background: #FEFCF8 !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    /* grid scrolls freely inside */
    display: block;
  }
  #panel.open { height: 78svh; }

  /* Handle and head stick to the top while content scrolls */
  .panel-handle {
    display: block;
    width: 36px; height: 4px;
    background: #D8D0C4;
    border-radius: 2px;
    margin: 10px auto 4px;
  }
  #panel-head {
    padding: 8px 18px 10px;
    background: #FEFCF8;
    border-bottom: 1px solid #EDE7DC;
  }
  #panel-country { font-size: 17px; }

  #grid {
    flex: none;
    padding: 0 0 48px;
  }

  .card-thumb { height: 88px; }
  #backdrop.visible { display: block; }
  #hint { display: none; }
  #reset-btn { bottom: 8px; right: 8px; }
}
</style>
</head>

<div id="backdrop"></div>

/* ═══════════════════════════════════════════════════════════════
   ДОПОЛНИТЕЛЬНЫЕ ТЕМАТИЧЕСКИЕ СПИСКИ (общества/течения) — только
   в «Списках», не на карте. Чтобы добавить новое: впиши сюда
   { id, label } + цвет в GROUP_COLORS, и проставь groups:["id"]

   ═══════════════════════════════════════════════════════════════ */
const CUSTOM_GROUPS = [
  { id:"прерафаэлиты", label:"Прерафаэлиты" },

];

  "укиё-э":        "#8C3A3A",
  "люминизм":      "#2A7A8A"
};

/* ─── ЦВЕТА СТИЛЕЙ (= фильтр карты + чипы + списки) ─── */
const STYLE_COLORS = {
  "академизм":   "#9C7A3C",
  "пейзажи":     "#4F8F5B",
  "символизм":   "#5C6FB0",
  "сюрреализм":  "#1F8A8A",
  "авангард":    "#7A52C9",
  "иллюстрации": "#C2607A"
};
const PAL_COLORS = { A:"#C47448", B:"#6890BE", C:"#6A9A6A", D:"#C8A038", E:"#A87272" };
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
const chipColor = tag => STYLE_COLORS[tag] || GROUP_COLORS[tag] || '#9A9088';

/* ─── STATS ─── */
const nC = Object.keys(DATA).length;
const nA = Object.values(DATA).reduce((s, c) => s + c.list.reduce((ss, a) => ss + a.articles.length, 0), 0);
document.getElementById('h-stats').textContent = `${nC} стран · ${nA} статей`;

/* ─── LISTS BAR ─── */
const listsBar = document.getElementById('lists-bar');
const LIST_ENTRIES = [
  { id:'collections', label:'Подборки',    type:'collections' },
  { id:'all-articles', label:'Все статьи', type:'all-articles' },
  ...Object.keys(STYLE_COLORS).map(tag => ({ id: tag, label: cap(tag), type: 'style' })),
  ...CUSTOM_GROUPS.map(g => ({ id: g.id, label: g.label, type: 'group' }))
];
LIST_ENTRIES.forEach(entry => {

  b.className = 'pill';
  b.dataset.listId = entry.id;
  b.dataset.listType = entry.type;

});

/* ─── FILTERS BAR (карта) ─── */
const filtersBar = document.getElementById('filters-bar');
const mkFilterPill = (tag, label, isActive) => {
  const b = document.createElement('button');
  b.className = 'pill' + (isActive ? ' active' : '');
  b.dataset.tag = tag;
  b.textContent = label;
  return b;
};
filtersBar.appendChild(mkFilterPill('all', 'Все', true));
Object.keys(STYLE_COLORS).forEach(tag => filtersBar.appendChild(mkFilterPill(tag, cap(tag), false)));

/* ─── STATE ─── */
const W = 960, H = 480;
const svgEl    = document.getElementById('world-svg');
const svg      = d3.select(svgEl);
const tip      = document.getElementById('tip');
const hint     = document.getElementById('hint');
const panel    = document.getElementById('panel');
const backdrop = document.getElementById('backdrop');
const mapWrap  = document.getElementById('map-wrap');
const lightbox    = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

let paths        = null;
let active       = null;
let activeFilter = 'all';
let zoomBehavior = null;

const matchesFilter  = a => activeFilter === 'all' || a.tags.includes(activeFilter);
const countryMatches = c => c && c.list.some(matchesFilter);

function getClass(d) {
  // d.id may be a number (36) or zero-padded string ("036") depending on topojson version
  const id = String(+d.id);  // "036" → 36 → "36"; 36 → "36"
  const c = DATA[id];
  if (!countryMatches(c)) return 'country clr-0';
  return `country has-artists clr-${c.pal}${id === active ? ' active' : ''}`;
}
function updateMap() { if (paths) paths.attr('class', d => getClass(d)); }

/* ─── PANEL POSITIONING ─────────────────────────────────────────────
   Align panel top edge with map-wrap top (below both bars).
   ─────────────────────────────────────────────────────────────────── */
function updatePanelTop() {
  panel.style.top = mapWrap.getBoundingClientRect().top + 'px';
}
window.addEventListener('resize', updatePanelTop);

/* ─── IMAGE REGISTRY ───────────────────────────────────────────
   Хранит картинки по имени художника (ключ = поле n в DATA).
   1. Сначала ищет здесь.
   2. Если не найдено — пробует examples/<имя>.jpg (фоллбек).
   Чтобы добавить картинку: IMAGES["Имя художника"] = "URL или data:";
   ─────────────────────────────────────────────────────────────── */
const IMAGES = {}; /* add base64 overrides here if needed */

/* ─── DTF TITLE FETCHING ─────────────────────────────────────────────
   Async: renders panel immediately with "Читать →",
   then patches link texts once DTF API responds.
   api.dtf.ru/v2.9/entry/{id} is a public Osnova-platform endpoint.
   ─────────────────────────────────────────────────────────────────── */
const TITLE_CACHE = {};  // url → title string | null

function extractDTFId(url) {
  const m = url.match(/\/(\d{5,})-/);
  return m ? m[1] : null;
}

function cleanDTFTitle(raw) {
  // "Архип Куинджи - Красный закат — Арт на DTF"  →  "Архип Куинджи — Красный закат"
  // "Николай Сергеев — Арт на DTF"               →  "Николай Сергеев"
  return raw
    .replace(/\s*[—–-]+\s*(Арт|арт|DTF|dtf)[^—]*$/u, '')
    .replace(/\s+на\s+DTF\s*$/i, '')
    .trim();
}

async function fetchAndPatchTitles(urls) {
  await Promise.all(urls.map(async url => {
    if (url in TITLE_CACHE) return;
    const id = extractDTFId(url);
    if (!id) { TITLE_CACHE[url] = null; return; }
    try {
      const r = await fetch(`https://api.dtf.ru/v2.9/entry/${id}`, { mode: 'cors' });
      if (!r.ok) throw new Error();
      const data = await r.json();
      TITLE_CACHE[url] = cleanDTFTitle(data.result?.title || '');
    } catch { TITLE_CACHE[url] = null; }
  }));
  // Patch all rendered link texts in the open panel
  document.querySelectorAll('[data-dtf-url]').forEach(el => {
    const t = TITLE_CACHE[el.dataset.dtfUrl];
    if (t) el.textContent = t;
  });
}

/* ─── IMAGE LOADER ───────────────────────────────────────────────────
   Inserts strips synchronously (hidden imgs), each img reveals on load.
   Strip has zero height until at least one image loads — no ghost gaps.
   ─────────────────────────────────────────────────────────────────── */

function loadImagesForGrid(grid) {
  if (!grid) return;
  const gen = ++_gridGen;

  grid.querySelectorAll('[data-slug]').forEach(card => {
    if (gen !== _gridGen) return;
    const slug = card.dataset.slug;
    if (!slug) return;
    const pos = card.dataset.imgpos || '';

    // Remove any existing strip
    card.querySelector('.card-thumbs')?.remove();

    const strip = document.createElement('span');
    strip.className = 'card-thumbs';

    // Override: check IMAGES registry first
    const name = card.querySelector('.card-name')?.textContent?.trim() || '';
    if (IMAGES[name]) {
      const img = document.createElement('img');
      img.className = 'card-thumb';
      img.src = IMAGES[name];
      if (pos) img.style.objectPosition = pos;
      img.addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation(); openLightbox(img.src);
      });
      strip.appendChild(img);
    } else {
      [1, 2, 3].forEach(n => {
        const img = document.createElement('img');
        img.className = 'card-thumb';
        img.style.display = 'none'; // hidden until loaded
        if (pos) img.style.objectPosition = pos;
        img.addEventListener('click', e => {
          e.preventDefault(); e.stopPropagation(); openLightbox(img.src);
        });

        const base = `examples/${slug}_${n}`;
        const exts = ['jpg', 'jpeg', 'png'];
        let i = 0;
        const tryNext = () => {
          if (i < exts.length) { img.src = `${base}.${exts[i++]}`; }
          else { img.remove(); } // all formats failed
        };
        img.onerror = tryNext;
        img.onload  = () => { img.style.display = 'block'; };

        strip.appendChild(img);
        tryNext();
      });
    }

    const anchor = card.querySelector('.card-arrow, .card-links');
    if (anchor) anchor.before(strip);
    else card.appendChild(strip);
  });
}

let _gridGen = 0;

/* ─── LIGHTBOX* ─── LIGHTBOX ─── */
function openLightbox(src) { lightboxImg.src = src; lightbox.classList.add('open'); }
function closeLightbox() { lightbox.classList.remove('open'); lightboxImg.src = ''; }
lightbox.addEventListener('click', closeLightbox);
document.getElementById('lightbox-close').addEventListener('click', e => { e.stopPropagation(); closeLightbox(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

/* ─── RENDER MAP ─── */
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    const features = topojson.feature(world, world.objects.countries).features
      .filter(d => d.id !== 10);
    const featureCollection = { type: 'FeatureCollection', features };

    const projection = d3.geoNaturalEarth1().fitSize([W, H], featureCollection);
    const path = d3.geoPath().projection(projection);
    const g = svg.append('g');

    const b = path.bounds(featureCollection);
    const pad = 6;
    svgEl.setAttribute('viewBox',
      `${b[0][0] - pad} ${b[0][1] - pad} ${b[1][0] - b[0][0] + 2 * pad} ${b[1][1] - b[0][1] + 2 * pad}`);
    svgEl.setAttribute('preserveAspectRatio', 'xMidYMid slice');

    zoomBehavior = d3.zoom().scaleExtent([1, 10]).on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoomBehavior);

    paths = g.selectAll('path').data(features).join('path')
      .attr('class', d => getClass(d))
      .attr('d', path);

    const mobile = matchMedia('(max-width: 640px)').matches;
    if (!mobile) {
      paths
        .on('mousemove', (ev, d) => {
          const c = DATA[String(+d.id)];
          if (!countryMatches(c)) { tip.style.opacity = 0; return; }
          const r = mapWrap.getBoundingClientRect();
          tip.style.opacity = 1;
          tip.style.left = `${ev.clientX - r.left}px`;
          tip.style.top  = `${ev.clientY - r.top}px`;
          tip.textContent = c.name;
        })
        .on('mouseleave', () => { tip.style.opacity = 0; });
    }

    paths.on('click', function(ev, d) {
      ev.stopPropagation();
      const id = String(+d.id);
      const c = DATA[id];
      if (!countryMatches(c)) { closePanel(); return; }
      selectCountry(id);
    });

    mapWrap.addEventListener('click', closePanel);
    updatePanelTop();
  })
  .catch(() => { hint.textContent = 'Не удалось загрузить карту.'; });

/* ─── FILTERS BAR EVENTS ─── */
filtersBar.addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn || !btn.dataset.tag) return;
  filtersBar.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.tag;
  updateMap();
  if (active && DATA[active]) {
    countryMatches(DATA[active]) ? openPanel(DATA[active]) : closePanel();
  }
});

/* ─── LISTS BAR EVENTS ─── */
listsBar.addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn) return;
  const id  = btn.dataset.listId;
  const key = `list:${id}`;
  if (active === key) { closePanel(); return; }
  listsBar.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  active = key;
  updateMap();
  hint.classList.add('gone');
  tip.style.opacity = 0;
  if (btn.dataset.listType === 'collections') openCollectionsPanel();
  else if (btn.dataset.listType === 'all-articles') openAllArticlesPanel();
  else openThematicListPanel(id, btn.textContent, btn.dataset.listType === 'group');
});

/* ─── RESET ZOOM ─── */
document.getElementById('reset-btn').addEventListener('click', () => {
  if (zoomBehavior) svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity);
});

/* ─── CARD RENDERING ─── */
function pluralArt(n) {
  if (n === 1) return 'художник';
  if (n < 5)  return 'художника';
  return 'художников';
}
function chipRow(a, country) {
  const tags = [...(a.tags || []), ...(a.groups || [])];
  let html = '<div class="chip-row">';
  if (country) {
    const c = PAL_COLORS[country.pal];
    html += `<span class="chip chip-country" style="color:${c}"><span class="chip-dot" style="background:${c}"></span>${country.name}</span>`;
  }
  html += tags.map(t => `<span class="chip" style="background:${chipColor(t)}">${cap(t)}</span>`).join('');
  html += '</div>';
  return html;
}
/* country передаётся только в плоских списках (стиль/общество/подборки) —
   внутри панели конкретной страны он и так ясен из заголовка панели */
function renderArtistCard(a, country) {
  /* Images are injected async by loadImagesForGrid() — no thumbs here */
  if (a.articles.length === 1) {
    const u = a.articles[0].u;
    const cached = TITLE_CACHE[u];
    const label = a.articles[0].label || cached || 'Читать';
    return `<a class="card" href="${u}" target="_blank" rel="noopener"
        data-slug="${a.slug||''}" data-imgpos="${a.imgPos||''}">
      <span class="card-name">${a.n}</span>
      ${chipRow(a, country)}
      <span class="card-arrow" data-dtf-url="${u}">${label} →</span>
    </a>`;
  }
  const links = a.articles.map((art, i) => {
    const cached = TITLE_CACHE[art.u];
    const label = art.label || cached || `Статья ${i + 1}`;
    return `<a class="card-sub" href="${art.u}" target="_blank" rel="noopener" data-dtf-url="${art.u}">${label} →</a>`;
  }).join('');
  return `<div class="card-static"
      data-slug="${a.slug||''}" data-imgpos="${a.imgPos||''}">
    <span class="card-name">${a.n}</span>
    ${chipRow(a, country)}
    <div class="card-links">${links}</div>
  </div>`;
}
function renderCollectionCard(c) {
  const thumb = c.img
    ? `<span class="card-thumbs"><img class="card-thumb" src="${c.img}" alt="" onclick="event.preventDefault();event.stopPropagation();openLightbox(this.src)"></span>`
    : '';
  return `<a class="card" href="${c.u}" target="_blank" rel="noopener">
    <span class="card-name">${c.title}</span>
    ${thumb}
    <span class="card-arrow">Читать →</span>
  </a>`;
}

/* ─── ПАНЕЛЬ КОНКРЕТНОЙ СТРАНЫ (карта) ─── */
function selectCountry(id) {
  if (active === id) { closePanel(); return; }
  active = id;
  updateMap();
  hint.classList.add('gone');
  tip.style.opacity = 0;
  openPanel(DATA[id]);
}
function openPanel(data) {
  listsBar.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  const artists = data.list.filter(matchesFilter);
  document.getElementById('panel-country').textContent = data.name;
  document.getElementById('panel-n').textContent = `${artists.length} ${pluralArt(artists.length)}`;
  document.getElementById('grid').innerHTML = artists.map(a => renderArtistCard(a)).join('');
  panel.classList.add('open');
  backdrop.classList.add('visible');
  // Fetch real article titles from DTF API in background
  const urls = data.list.filter(matchesFilter).flatMap(a => a.articles.map(x => x.u));
  fetchAndPatchTitles(urls);
  loadImagesForGrid(document.getElementById('grid'));
}

/* ─── ПОДБОРКИ ─── */
function openCollectionsPanel() {
  document.getElementById('panel-country').textContent = 'Тематические подборки';
  document.getElementById('panel-n').textContent = COLLECTIONS.length ? `${COLLECTIONS.length} материалов` : '';
  document.getElementById('grid').innerHTML = COLLECTIONS.length
    ? COLLECTIONS.map(renderCollectionCard).join('')
    : `<div class="card-static"><span class="card-name" style="color:#A09688;font-weight:400">Здесь появятся подборки — добавь ссылки в массив COLLECTIONS.</span></div>`;
  panel.classList.add('open');
  backdrop.classList.add('visible');
}

/* ─── ВСЕ СТАТЬИ — полный список без фильтра ────────────────────── */
function openAllArticlesPanel() {
  const rows = [];
  Object.values(DATA).forEach(country => {
    country.list.forEach(a => rows.push({ a, country }));
  });
  rows.sort((x, y) => x.a.n.localeCompare(y.a.n, 'ru'));
  const total = rows.reduce((s, { a }) => s + a.articles.length, 0);
  document.getElementById('panel-country').textContent = 'Все статьи';
  document.getElementById('panel-n').textContent = `${total} материалов`;
  document.getElementById('grid').innerHTML = rows.map(({ a, country }) => renderArtistCard(a, country)).join('');
  panel.classList.add('open');
  backdrop.classList.add('visible');
  const urls = rows.flatMap(({ a }) => a.articles.map(x => x.u));
  fetchAndPatchTitles(urls);
  loadImagesForGrid(document.getElementById('grid'));
}

/* ─── ПЛОСКИЙ ТЕМАТИЧЕСКИЙ СПИСОК (стиль/общество), без карты ─── */
function openThematicListPanel(tagId, label, isGroup) {
  const rows = [];
  Object.values(DATA).forEach(country => {
    country.list.forEach(a => {
      const has = isGroup ? (a.groups || []).includes(tagId) : (a.tags || []).includes(tagId);
      if (has) rows.push({ a, country });
    });
  });
  rows.sort((x, y) => x.a.n.localeCompare(y.a.n, 'ru'));

  document.getElementById('panel-country').textContent = label;
  document.getElementById('panel-n').textContent = `${rows.length} ${pluralArt(rows.length)}`;
  document.getElementById('grid').innerHTML = rows.length
    ? rows.map(({ a, country }) => renderArtistCard(a, country)).join('')
    : `<div class="card-static"><span class="card-name" style="color:#A09688;font-weight:400">Пока никого нет в этом списке.</span></div>`;
  panel.classList.add('open');
  backdrop.classList.add('visible');
  // Fetch real article titles from DTF API in background
  if (rows.length) {
    const urls = rows.flatMap(({ a }) => a.articles.map(x => x.u));
    fetchAndPatchTitles(urls);
    loadImagesForGrid(document.getElementById('grid'));
  }
}

function closePanel() {
  panel.classList.remove('open');
  backdrop.classList.remove('visible');
  listsBar.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  if (active !== null) { active = null; updateMap(); }
}

document.getElementById('close-btn').addEventListener('click', e => { e.stopPropagation(); closePanel(); });

// Prevent D3's global touch listeners from swallowing panel scroll events
panel.addEventListener('touchmove', e => e.stopPropagation(), { passive: true });
panel.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
backdrop.addEventListener('click', closePanel);
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Атлас живописи — Dracubik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

button {
  font: inherit;
  color: inherit;
  background: none;
  border: none;
  padding: 0;
  margin: 0;
  cursor: pointer;
  text-decoration: none !important;
  -webkit-appearance: none;
  appearance: none;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}
a, button, [role="button"] { -webkit-tap-highlight-color: transparent; }
a.card, a.card *, a.card-sub { text-decoration: none !important; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #F5F0E8;
  color: #1C1814;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ──────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  padding: 10px 24px;
  gap: 12px;
  background: #FAF8F3;
  border-bottom: 1px solid #E5DED2;
  flex-shrink: 0;
}
.h-brand { display: flex; align-items: baseline; gap: 9px; }
.h-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.01em;
  color: #1C1814;
}
.h-by {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #C47448;
}
.h-stats {
  font-size: 11px;
  color: #A09688;
  margin-left: auto;
  white-space: nowrap;
}
.h-ver { font-size: 10px; color: #C8B090; margin-left: 8px; }

/* ── BARS ────────────────────────────────────── */
.bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 24px;
  border-bottom: 1px solid #E5DED2;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.bar::-webkit-scrollbar { display: none; }
.bar-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #B0A898;
  flex-shrink: 0;
  padding-right: 4px;
}
#lists-bar { background: #F0E8DA; }
#filters-bar { background: #FAF8F3; }

#lists-bar .pill {
  border-color: #D2C2A6;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
#lists-bar .pill:hover { background: #E5D5BC; }

.pill-info {
  font-size: 13px;
  padding: 8px 12px;
  margin-left: auto;
  margin-right: -8px;
  opacity: 0.5;
  cursor: pointer;
  pointer-events: all;
  transition: opacity 0.12s;
  flex-shrink: 0;
}
.pill-info:hover { opacity: 1; }

.pill {
  padding: 4px 13px;
  font-size: 12px;
  font-weight: 400;
  border: 1px solid #D8D0C4;
  border-radius: 20px;
  color: #7A6E62;
  white-space: nowrap;
  flex-shrink: 0;
  line-height: 1.6;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.pill:hover { background: #F0E8DC; border-color: #C8B89C; color: #3C3028; }
.pill.active { background: #C47448; border-color: #C47448; color: #fff; }

/* ── MAP ─────────────────────────────────────── */
#map-wrap {
  flex: 1;
  position: relative;
  background: #A8B4BF;
  overflow: hidden;
  min-height: 0;
  cursor: grab;
}
#map-wrap:active { cursor: grabbing; }
#world-svg { width: 100%; height: 100%; display: block; touch-action: none; }

.country { stroke: #F5F0E8; stroke-width: 0.4; transition: fill 0.13s; cursor: default; }
.clr-0 { fill: #C8C0B0; }

/* 7-colour map palette — adjacent highlighted countries use different letters */
.clr-A { fill: #C47448; }                          /* terracotta */
.has-artists.clr-A:hover { fill: #A85830; }
.has-artists.clr-A.active { fill: #8A3C14; }
.clr-B { fill: #6890BE; }                          /* steel blue */
.has-artists.clr-B:hover { fill: #4A72A0; }
.has-artists.clr-B.active { fill: #2E5888; }
.clr-C { fill: #6A9A6A; }                          /* sage green */
.has-artists.clr-C:hover { fill: #4E7E4E; }
.has-artists.clr-C.active { fill: #366038; }
.clr-D { fill: #C8A038; }                          /* amber gold */
.has-artists.clr-D:hover { fill: #A8841C; }
.has-artists.clr-D.active { fill: #886800; }
.clr-E { fill: #A87272; }                          /* dusty mauve */
.has-artists.clr-E:hover { fill: #8A5656; }
.has-artists.clr-E.active { fill: #703838; }
.clr-F { fill: #8A7CB8; }                          /* muted violet */
.has-artists.clr-F:hover { fill: #6E5F9E; }
.has-artists.clr-F.active { fill: #52427E; }
.clr-G { fill: #4F9E9A; }                          /* teal */
.has-artists.clr-G:hover { fill: #388682; }
.has-artists.clr-G.active { fill: #206664; }
.has-artists { cursor: pointer; }

#tip {
  position: absolute;
  background: rgba(22, 18, 12, 0.86);
  color: #F2EDE4;
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 5px;
  pointer-events: none;
  transform: translate(-50%, calc(-100% - 10px));
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.1s;
  z-index: 20;
}
#hint {
  position: absolute;
  bottom: 14px; left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(242, 237, 228, 0.92);
  background: rgba(22, 18, 12, 0.38);
  padding: 5px 16px;
  border-radius: 20px;
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 0.5s;
  z-index: 10;
}
#hint.gone { opacity: 0; }
#reset-btn {
  position: absolute;
  bottom: 14px; right: 14px;
  width: 32px; height: 32px;
  background: rgba(250, 248, 243, 0.88);
  border: 1px solid #D0C8BC;
  border-radius: 7px;
  font-size: 14px;
  color: #7A6E62;
  z-index: 10;
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, color 0.12s;
}
#reset-btn:hover { background: #FAF8F3; color: #1C1814; }

/* ── PANEL — right-side frosted glass overlay ──────────────────── */
#panel {
  position: fixed;
  right: calc(-1 * min(48vw, 580px) - 40px);
  top: 0;
  bottom: 0;
  width: min(48vw, 580px);
  z-index: 50;
  background: #FEFCF8;
  border-left: 1px solid rgba(229, 222, 210, 0.65);
  box-shadow: -6px 0 36px rgba(28, 24, 18, 0.13);
  transition: right 0.26s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
@media (min-width: 641px) {
  #panel {
    background: rgba(252, 250, 246, 0.72);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
  }
}
#panel.open { right: 0; }
.panel-handle { display: none; }
#panel-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 16px 18px 12px;
  border-bottom: 1px solid rgba(229, 222, 210, 0.7);
  position: sticky;
  top: 0;
  z-index: 2;
  background: #FCFAF6;
  flex-shrink: 0;
}
.panel-head-text { display: flex; flex-direction: column; }
#panel-country {
  font-family: 'Playfair Display', serif;
  font-size: 19px;
  font-weight: 400;
  color: #1C1814;
  line-height: 1.3;
  display: flex;
  align-items: center;
  gap: 8px;
}
#panel-title-info {
  font-size: 22px;
  color: #C47448;
  cursor: pointer;
  transition: transform 0.12s, color 0.12s;
  line-height: 1;
}
#panel-title-info:hover { color: #A35A33; transform: scale(1.15); }
#panel-n { font-size: 11px; color: #A09688; margin-top: 3px; }
#close-btn {
  font-size: 22px; line-height: 1;
  color: #B0A898;
  padding: 1px 4px;
  margin-left: 8px;
  flex-shrink: 0;
  border-radius: 4px;
  transition: color 0.12s;
}
#close-btn:hover { color: #1C1814; }
#grid {
  display: flex;
  flex-direction: column;
  padding: 0 0 24px;
}

.card-thumbs {
  display: flex;
  gap: 4px;
  margin: 6px 0 0;
  flex-wrap: nowrap;
}
.card-thumb {
  flex: 0 0 calc(33.333% - 3px);
  width: calc(33.333% - 3px);
  height: 120px;
  border-radius: 5px;
  object-fit: cover;
  object-position: center 20%;
  cursor: zoom-in;
  box-shadow: 0 0 0 1px rgba(28,24,20,0.10);
  display: block;
}

/* ── CARD LAYOUT ──────────────────────────────────────────────────── */
a.card, div.card-static {
  display: block;
  width: 100%;
  padding: 13px 16px 11px;
  border-bottom: 1px solid rgba(229, 222, 210, 0.55);
  transition: background 0.12s;
}
a.card:last-child, div.card-static:last-child { border-bottom: none; }
a.card { text-decoration: none; }
a.card:hover { background: rgba(240, 234, 224, 0.65); }

.card-name {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #1C1814;
  line-height: 1.4;
}
.card-arrow { display: block; font-size: 11px; color: #B06438; margin-top: 5px; }
.card-links { margin-top: 6px; display: flex; flex-direction: column; gap: 1px; }
.card-sub {
  display: block;
  font-size: 11px;
  color: #B06438;
  text-decoration: none;
  padding: 2px 0;
}
.card-sub:hover { color: #8A3C14; text-decoration: underline; }

.chip-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.chip {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: #fff;
  padding: 2px 7px;
  border-radius: 9px;
  line-height: 1.5;
  white-space: nowrap;
}
.chip-country {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #fff;
  border: 1px solid currentColor;
  padding: 1px 8px 1px 6px;
}
.chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ── LIGHTBOX ────────────────────────────────── */
#lightbox {
  position: fixed; inset: 0;
  background: rgba(12, 9, 6, 0.88);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 28px;
  cursor: zoom-out;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 92vw;
  max-height: 88vh;
  border-radius: 6px;
  box-shadow: 0 16px 56px rgba(0,0,0,0.5);
}
#lightbox-close {
  position: absolute;
  top: 18px; right: 22px;
  font-size: 30px;
  color: #F5F0E8;
  line-height: 1;
}

/* ── INFO POPUP ──────────────────────────────── */
#info-popup {
  position: fixed;
  width: 320px;
  max-width: calc(100vw - 32px);
  background: #FEFCF8;
  border: 1px solid rgba(229, 222, 210, 0.9);
  border-radius: 12px;
  padding: 18px 20px 20px;
  box-shadow: 0 12px 40px rgba(28, 24, 18, 0.2);
  z-index: 200;
  display: none;
  max-height: 400px;
  overflow-y: auto;
}
#info-popup.open { display: block; }

#info-popup-close {
  position: absolute;
  top: 12px;
  right: 16px;
  font-size: 26px;
  line-height: 1;
  color: #8C7D70;
  cursor: pointer;
  padding: 4px;
  background: none;
  border: none;
  z-index: 10;
}
#info-popup-close:hover { color: #2C2420; }

.info-popup-meta {
  font-size: 16px;
  font-weight: 700;
  text-align: center;
  color: #2C2420;
  margin-top: 4px;
  margin-bottom: 16px;
}
.info-popup-text {
  font-size: 13.5px;
  line-height: 1.6;
  color: #2C2420;
  white-space: pre-wrap;
}
.info-popup-text p { margin-bottom: 8px; }
.info-popup-text p:last-child { margin-bottom: 0; }
.info-popup-text b, .info-popup-text strong { font-weight: 600; color: #1C1814; }

.card-name-row {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 6px;
}
.info-btn {
  font-size: 16px;
  color: #C47448;
  background: transparent;
  border: none;
  padding: 4px;
  margin: 0;
  flex-shrink: 0;
  cursor: pointer;
  transition: color 0.12s, transform 0.12s;
}
.info-btn:hover { color: #A35A33; transform: scale(1.15); }

#info-popup-close-bottom {
  display: block;
  width: 100%;
  margin-top: 24px;
  padding: 12px;
  background: #F0E8DA;
  color: #2C2420;
  border: 1px solid #D2C2A6;
  border-radius: 8px;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s;
}
#info-popup-close-bottom:hover { background: #E5D5BC; }

/* ── BACKDROP (mobile) ───────────────────────── */
#backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(28, 24, 18, 0.10);
  z-index: 40;
}

/* ── MOBILE ──────────────────────────────────── */
@media (max-width: 640px) {
  header { padding: 9px 16px; gap: 8px; }
  .h-title { font-size: 15px; }
  .h-by { display: none; }
  .h-stats { display: none; }
  .bar { padding: 7px 14px; }

  #panel {
    position: fixed;
    right: 0 !important; left: 0; bottom: 0;
    top: auto !important;
    width: 100% !important;
    z-index: 50;
    height: 0;
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    transition: height 0.28s ease-out !important;
    border-radius: 14px 14px 0 0;
    border-left: none;
    border-top: 1px solid #E5DED2;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.16);
    background: #FEFCF8 !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    display: block;
  }
  #panel.open { height: 78svh; }

  .panel-handle {
    display: block;
    width: 36px; height: 4px;
    background: #D8D0C4;
    border-radius: 2px;
    margin: 10px auto 4px;
  }
  #panel-head {
    padding: 8px 18px 10px;
    background: #FEFCF8;
    border-bottom: 1px solid #EDE7DC;
  }
  #panel-country { font-size: 17px; }

  #grid { padding: 0 0 48px; }

  .card-thumb { height: 88px; }
  #backdrop.visible { display: block; }
  #hint { display: none; }
  #reset-btn { bottom: 8px; right: 8px; }
}
</style>
</head>
<body>

<header>
  <div class="h-brand">
    <span class="h-title">Атлас живописи</span>
    <span class="h-by">by Dracubik</span>
  </div>
  <span class="h-stats" id="h-stats"></span><span class="h-ver">v17</span>
</header>

<div id="lists-bar" class="bar">
  <span class="bar-label">Списки</span>
</div>

<div id="filters-bar" class="bar">
  <span class="bar-label">Стиль карты</span>
</div>

<div id="map-wrap">
  <svg id="world-svg" viewBox="0 0 960 480" preserveAspectRatio="xMidYMid meet"></svg>
  <div id="tip"></div>
  <div id="hint">Выделенные страны — нажмите для просмотра статей</div>
  <button id="reset-btn" title="Сбросить масштаб">↺</button>
</div>

<div id="panel">
  <div class="panel-handle"></div>
  <div id="panel-head">
    <div class="panel-head-text">
      <span id="panel-country"></span>
      <span id="panel-n"></span>
    </div>
    <button id="close-btn" aria-label="Закрыть">×</button>
  </div>
  <div id="grid"></div>
</div>

<div id="backdrop"></div>

<div id="lightbox">
  <button id="lightbox-close" aria-label="Закрыть превью">×</button>
  <img id="lightbox-img" src="" alt="">
</div>

<div id="info-popup">
  <button id="info-popup-close" aria-label="Закрыть">×</button>
  <div id="info-popup-meta" class="info-popup-meta"></div>
  <div id="info-popup-text" class="info-popup-text"></div>
  <button id="info-popup-close-bottom">Закрыть</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════
   DATA — ARTISTS BY COUNTRY

   Country key = ISO 3166-1 numeric code.
   Look up codes at: https://en.wikipedia.org/wiki/ISO_3166-1_numeric

   Artist entry:
     {
       n:      "Name",
       slug:    "slug",              — used for examples/<slug>_N.jpg and bios.json key
       tags:   ["style", ...],       — matches STYLE_COLORS (map filter + lists)
       groups: ["group-id", ...],    — matches CUSTOM_GROUPS (lists only, optional)
       imgPos: "center 30%",         — optional object-position override
       articles: [{ label:"...", u:"URL" }, ...]  — one or more DTF links
     }

   Country palette letter (pal) — pick A-G so it differs from any
   neighbouring highlighted country on the map.
   ═══════════════════════════════════════════════════════════════ */
const DATA = {
  "643": { pal:"D", name:"Россия", list:[
    { n:"Исаак Левитан", slug:"levitan", tags:["пейзажи"], articles:[{ u:"https://dtf.ru/art/4977382-isaak-levitan-vesna-v-italii" }] },
    { n:"Илья Занковский", slug:"zankovskiy", tags:["пейзажи"], articles:[{ u:"https://dtf.ru/art/3812190-ilya-zankovskii" }] },
    { n:"Алексей Савченко", slug:"savchenko", tags:["пейзажи"], articles:[{ u:"https://dtf.ru/s/art/3652008-aleksei-savchenko" }] },
    { n:"Николай Сергеев", slug:"sergeev", tags:["пейзажи"], groups:["люминизм"], articles:[{ u:"https://dtf.ru/s/art/3083815-nikolai-sergeev" }] },
    { n:"Пётр Суходольский", slug:"suhodolskiy", tags:["пейзажи","академизм"], articles:[{ u:"https://dtf.ru/s/art/2780980-petr-suhodolskii" }] },
    { n:"Александр Головин", slug:"golovin", tags:["академизм"], articles:[{ u:"https://dtf.ru/s/art/2526930-hudozhnik-aleksandr-golovin" }] },
    { n:"Алексей Боголюбов", slug:"bogolubov", tags:["академизм"], articles:[{ u:"https://dtf.ru/u/455288-dracubik/2274275-hudozhnik-aleksei-bogolyubov" }] },
    { n:"Максим Воробьёв", slug:"vorobjev", tags:["академизм"], articles:[{ u:"https://dtf.ru/u/455288-dracubik/2039645-maksim-vorobyov-dub-razdroblennyj-molniej" }] },
    { n:"Архип Куинджи", slug:"kuinzhi", tags:["пейзажи"], groups:["люминизм"], articles:[{ u:"https://dtf.ru/u/455288-dracubik/2015028-arhip-kuindzhi-krasnyj-zakat" }] },
    { n:"Вильгельм Котарбинский", slug:"kotabrinskiy", tags:["академизм","символизм"], articles:[{ u:"https://dtf.ru/s/art/2622736-vilgelm-kotarbinskii" }] }
  ]},
  "826": { pal:"C", name:"Великобритания", list:[
    { n:"Джордж Фредерик Уоттс", slug:"uotts", tags:["символизм"], articles:[{ u:"https://dtf.ru/art/3728204-dzhordzh-frederik-uotts" }] },
    { n:"Джон Эткинсон Гримшоу", slug:"grimshou", tags:["академизм"], articles:[{ u:"https://dtf.ru/s/art/3031558-dzhon-etkinson-grimshou" }] },
    { n:"Джон Мартин", slug:"martin", tags:["академизм"], articles:[{ u:"https://dtf.ru/s/art/2908585-dzhon-martin" }] },
    { n:"Уолтер Миган", slug:"migan", tags:["академизм"], articles:[{ u:"https://dtf.ru/art/2869563-uolter-migan" }] },
    { n:"Эдмунд Дюлак", slug:"dulak", tags:["иллюстрации"], articles:[{ u:"https://dtf.ru/s/art/2573802-edmund-dyulak" }] },
    { n:"Эрнест Грисе", slug:"grise", tags:["иллюстрации"], articles:[{ u:"https://dtf.ru/u/455288-dracubik/2413024-ernest-grise-cikada-i-sova" }] },

function showInfoPopup(meta, text, anchorEl) {
  infoPopupMeta.textContent = meta || '';
  infoPopupMeta.style.display = meta ? 'block' : 'none';
  infoPopupText.textContent = text;
  infoPopup.classList.add('open');

  // Measure actual popup size now that content is in, then position it
  const pRect = infoPopup.getBoundingClientRect();
  const pw = pRect.width, ph = pRect.height;
  const r = anchorEl.getBoundingClientRect();

  let left = r.right + 10;
  let top = r.top;
  if (left + pw > window.innerWidth - 8) left = r.left - pw - 10;
  if (left < 8) left = 8;
  if (top + ph > window.innerHeight - 8) top = window.innerHeight - ph - 8;
  if (top < 8) top = 8;

  infoPopup.style.left = left + 'px';
  infoPopup.style.top = top + 'px';
}

/* ─── DTF TITLE FETCHING ─────────────────────────────────────────────
   Renders "Узнать больше →" immediately, then patches in the real
   article title once api.dtf.ru responds (public Osnova endpoint).
   ─────────────────────────────────────────────────────────────────── */
const TITLE_CACHE = {};

function extractDTFId(url) {
  const m = url.match(/\/(\d{5,})-/);
  return m ? m[1] : null;
}
function cleanDTFTitle(raw) {
  return raw
    .replace(/\s*[—–-]+\s*(Арт|арт|DTF|dtf)[^—]*$/u, '')
    .replace(/\s+на\s+DTF\s*$/i, '')
    .trim();
}
async function fetchAndPatchTitles(urls) {
  await Promise.all(urls.map(async url => {
    if (url in TITLE_CACHE) return;
    const id = extractDTFId(url);
    if (!id) { TITLE_CACHE[url] = null; return; }
    try {
      const r = await fetch(`https://api.dtf.ru/v2.9/entry/${id}`, { mode: 'cors' });
      if (!r.ok) throw new Error();
      const data = await r.json();
      TITLE_CACHE[url] = cleanDTFTitle(data.result?.title || '');
    } catch { TITLE_CACHE[url] = null; }
  }));
  document.querySelectorAll('[data-dtf-url]').forEach(el => {
    const t = TITLE_CACHE[el.dataset.dtfUrl];
    if (t) el.textContent = t;
  });
}

/* ─── IMAGE LOADER ───────────────────────────────────────────────────
   Inserts image strips synchronously (hidden), each <img> reveals
   itself on load. A strip has zero height until at least one image
   loads, so slow/missing images never create layout gaps.
   ─────────────────────────────────────────────────────────────────── */
let _gridGen = 0;

function loadImagesForGrid(grid) {
  if (!grid) return;
  const gen = ++_gridGen;

  grid.querySelectorAll('[data-slug]').forEach(card => {
    if (gen !== _gridGen) return;
    const slug = card.dataset.slug;
    if (!slug) return;
    const pos = card.dataset.imgpos || '';

    card.querySelector('.card-thumbs')?.remove();
    const strip = document.createElement('span');
    strip.className = 'card-thumbs';

    const name = card.querySelector('.card-name')?.textContent?.trim() || '';
    if (IMAGES[name]) {
      const img = document.createElement('img');
      img.className = 'card-thumb';
      img.src = IMAGES[name];
      if (pos) img.style.objectPosition = pos;
      img.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); openLightbox(img.src); });
      strip.appendChild(img);
    } else {
      [1, 2, 3].forEach(n => {
        const img = document.createElement('img');
        img.className = 'card-thumb';
        img.style.display = 'none';
        if (pos) img.style.objectPosition = pos;
        img.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); openLightbox(img.src); });
        img.src = `examples/${slug}_${n}.jpg`;
        img.onerror = () => img.remove();
        img.onload = () => { img.style.display = 'block'; };
        strip.appendChild(img);
      });
    }

    const anchor = card.querySelector('.card-arrow, .card-links');
    if (anchor) anchor.before(strip);
    else card.appendChild(strip);
  });
}

/* ─── RENDER MAP ─── */
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    const features = topojson.feature(world, world.objects.countries).features
      .filter(d => d.id !== 10); // drop Antarctica
    const featureCollection = { type: 'FeatureCollection', features };

    const projection = d3.geoNaturalEarth1().fitSize([W, H], featureCollection);
    const path = d3.geoPath().projection(projection);
    const g = svg.append('g');

    const b = path.bounds(featureCollection);
    const pad = 6;
    svgEl.setAttribute('viewBox',
      `${b[0][0] - pad} ${b[0][1] - pad} ${b[1][0] - b[0][0] + 2 * pad} ${b[1][1] - b[0][1] + 2 * pad}`);
    svgEl.setAttribute('preserveAspectRatio', 'xMidYMid slice');

    zoomBehavior = d3.zoom().scaleExtent([1, 10]).on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoomBehavior);

    paths = g.selectAll('path').data(features).join('path')
      .attr('class', d => getClass(d))
      .attr('d', path);

    const mobile = matchMedia('(max-width: 640px)').matches;
    if (!mobile) {
      paths
        .on('mousemove', (ev, d) => {
          const c = DATA[String(+d.id)];
          if (!countryMatches(c)) { tip.style.opacity = 0; return; }
          const r = mapWrap.getBoundingClientRect();
          tip.style.opacity = 1;
          tip.style.left = `${ev.clientX - r.left}px`;
          tip.style.top = `${ev.clientY - r.top}px`;
          tip.textContent = c.name;
        })
        .on('mouseleave', () => { tip.style.opacity = 0; });
    }

    paths.on('click', function(ev, d) {
      ev.stopPropagation();
      const id = String(+d.id);
      const c = DATA[id];
      if (!countryMatches(c)) { closePanel(); return; }
      selectCountry(id);
    });

    mapWrap.addEventListener('click', closePanel);
    updatePanelTop();
  })
  .catch(() => { hint.textContent = 'Не удалось загрузить карту.'; });

/* ─── FILTERS BAR EVENTS ─── */
filtersBar.addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn || !btn.dataset.tag) return;
  filtersBar.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.tag;
  updateMap();
  if (active && DATA[active]) {
    countryMatches(DATA[active]) ? openPanel(DATA[active]) : closePanel();
  }
});

/* ─── LISTS BAR EVENTS ─── */
listsBar.addEventListener('click', e => {
  if (e.target.closest('.pill-info')) return;
  const btn = e.target.closest('.pill');
  if (!btn) return;
  const id = btn.dataset.listId;
  const key = `list:${id}`;
  if (active === key) { closePanel(); return; }
  listsBar.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  active = key;
  updateMap();
  hint.classList.add('gone');
  tip.style.opacity = 0;
  if (btn.dataset.listType === 'collections') openCollectionsPanel();
  else if (btn.dataset.listType === 'all-articles') openAllArticlesPanel();
  else openThematicListPanel(id, btn.textContent, btn.dataset.listType === 'group');
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (zoomBehavior) svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity);
});

/* ─── CARD RENDERING ─── */
function pluralArt(n) {
  if (n === 1) return 'художник';
  if (n < 5) return 'художника';
  return 'художников';
}
function chipRow(a, country) {
  const tags = [...(a.tags || []), ...(a.groups || [])];
  let html = '<div class="chip-row">';
  if (country) {
    const c = PAL_COLORS[country.pal];
    html += `<span class="chip chip-country" style="color:${c}"><span class="chip-dot" style="background:${c}"></span>${country.name}</span>`;
  }
  html += tags.map(t => `<span class="chip" style="background:${chipColor(t)}">${cap(t)}</span>`).join('');
  html += '</div>';
  return html;
}

/* country is only passed in flat lists (style/group/collections) —
   inside a single-country panel it's already obvious from the header */
function renderArtistCard(a, country) {
  if (a.articles.length === 1) {
    const u = a.articles[0].u;
    const cached = TITLE_CACHE[u];
    const label = a.articles[0].label || cached || 'Узнать больше';
    return `<a class="card" href="${u}" target="_blank" rel="noopener"
        data-slug="${a.slug||''}" data-imgpos="${a.imgPos||''}">
      <span class="card-name-row"><span class="card-name">${a.n}</span>${a.slug ? `<button class="info-btn" data-bio-slug="${a.slug}" title="О художнике">ⓘ</button>` : ''}</span>
      ${chipRow(a, country)}
      <span class="card-arrow" data-dtf-url="${u}">${label} →</span>
    </a>`;
  }
  const links = a.articles.map((art, i) => {
    const cached = TITLE_CACHE[art.u];
    const label = art.label || cached || `Статья ${i + 1}`;
    return `<a class="card-sub" href="${art.u}" target="_blank" rel="noopener" data-dtf-url="${art.u}">${label} →</a>`;
  }).join('');
  return `<div class="card-static"
      data-slug="${a.slug||''}" data-imgpos="${a.imgPos||''}">
    <span class="card-name-row"><span class="card-name">${a.n}</span>${a.slug ? `<button class="info-btn" data-bio-slug="${a.slug}" title="О художнике">ⓘ</button>` : ''}</span>
    ${chipRow(a, country)}
    <div class="card-links">${links}</div>
  </div>`;
}
function renderCollectionCard(c) {
  return `<a class="card" href="${c.u}" target="_blank" rel="noopener">
    <span class="card-name">${c.title}</span>
    <span class="card-arrow">Узнать больше →</span>
  </a>`;
}

/* ─── COUNTRY PANEL (map) ─── */
function selectCountry(id) {
  if (active === id) { closePanel(); return; }
  active = id;
  updateMap();
  hint.classList.add('gone');
  tip.style.opacity = 0;
  openPanel(DATA[id]);
}
function openPanel(data) {
  listsBar.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  const artists = data.list.filter(matchesFilter);
  document.getElementById('panel-country').textContent = data.name;
  document.getElementById('panel-n').textContent = `${artists.length} ${pluralArt(artists.length)}`;
  document.getElementById('grid').innerHTML = artists.map(a => renderArtistCard(a)).join('');
  panel.classList.add('open');
  backdrop.classList.add('visible');
  const urls = artists.flatMap(a => a.articles.map(x => x.u));
  fetchAndPatchTitles(urls);
  loadImagesForGrid(document.getElementById('grid'));
}

/* ─── COLLECTIONS ─── */
function openCollectionsPanel() {
  document.getElementById('panel-country').textContent = 'Тематические подборки';
  document.getElementById('panel-n').textContent = COLLECTIONS.length ? `${COLLECTIONS.length} материалов` : '';
  const sorted = [...COLLECTIONS].sort((a, b) => pubOrder(a.title) - pubOrder(b.title));
  document.getElementById('grid').innerHTML = sorted.length
    ? sorted.map(renderCollectionCard).join('')
    : `<div class="card-static"><span class="card-name" style="color:#A09688;font-weight:400">Здесь появятся подборки — добавь ссылки в массив COLLECTIONS.</span></div>`;
  panel.classList.add('open');
  backdrop.classList.add('visible');
}

/* ─── ALL ARTICLES — full flat list, no filter ─────────────────────── */
function openAllArticlesPanel() {
  const rows = [];
  Object.values(DATA).forEach(country => country.list.forEach(a => rows.push({ a, country })));
  rows.sort((x, y) => pubOrder(x.a.n) - pubOrder(y.a.n));

  const urls = new Set();
  rows.forEach(({ a }) => a.articles.forEach(art => urls.add(art.u)));

  document.getElementById('panel-country').textContent = 'Все статьи';
  document.getElementById('panel-n').textContent = `${urls.size} материалов`;
  document.getElementById('grid').innerHTML = rows.map(({ a, country }) => renderArtistCard(a, country)).join('');
  panel.classList.add('open');
  backdrop.classList.add('visible');
  fetchAndPatchTitles([...urls]);
  loadImagesForGrid(document.getElementById('grid'));
}

/* ─── FLAT THEMATIC LIST (style/group), not tied to the map ─────────── */
function openThematicListPanel(tagId, label, isGroup) {
  const rows = [];
  Object.values(DATA).forEach(country => {
    country.list.forEach(a => {
      const has = isGroup ? (a.groups || []).includes(tagId) : (a.tags || []).includes(tagId);
      if (has) rows.push({ a, country });
    });
  });
  rows.sort((x, y) => x.a.n.localeCompare(y.a.n, 'ru'));

  if (STYLES_INFO && STYLES_INFO[tagId]) {
    document.getElementById('panel-country').innerHTML =
      `${label} <span id="panel-title-info" data-style-key="${tagId}">ⓘ</span>`;
  } else {
    document.getElementById('panel-country').textContent = label;
  }
  document.getElementById('panel-n').textContent = `${rows.length} ${pluralArt(rows.length)}`;
  document.getElementById('grid').innerHTML = rows.length
    ? rows.map(({ a, country }) => renderArtistCard(a, country)).join('')
    : `<div class="card-static"><span class="card-name" style="color:#A09688;font-weight:400">Пока никого нет в этом списке.</span></div>`;
  panel.classList.add('open');
  backdrop.classList.add('visible');
  if (rows.length) {
    const urls = rows.flatMap(({ a }) => a.articles.map(x => x.u));
    fetchAndPatchTitles(urls);
    loadImagesForGrid(document.getElementById('grid'));
  }
}

function closePanel() {
  panel.classList.remove('open');
  backdrop.classList.remove('visible');
  listsBar.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  if (active !== null) { active = null; updateMap(); }
}

document.getElementById('close-btn').addEventListener('click', e => { e.stopPropagation(); closePanel(); });

// Prevent D3's global touch listeners from swallowing panel scroll events
panel.addEventListener('touchmove', e => e.stopPropagation(), { passive: true });
panel.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
backdrop.addEventListener('click', closePanel);
</script>
</body>
